# verl-agent config for E6 M2 — multi-turn GiGPO/GRPO on Balatro (LoRA, curriculum).
# POD-ONLY. Used as overrides on top of verl-agent's ppo_trainer.yaml, or as a reference for
# `python -m balatro_rl.llm.train_grpo --print-only`. Verify keys against the installed
# verl-agent version (see docs/RUNPOD_M2.md). Group size (rollout.n == env.rollout.n) = 8.

data:
  train_files: ~/data/balatro/train.parquet      # placeholder; env drives the task (see runbook)
  val_files:   ~/data/balatro/val.parquet
  train_batch_size: 16                            # task-groups per step (x rollout.n rollouts each)
  val_batch_size: 8                               # validation task-groups (group_n collapses to 1)
  max_prompt_length: 4096
  max_response_length: 512                        # brief reasoning + the JSON action
  return_raw_chat: True                           # required for multi-turn agent tasks
  filter_overlong_prompts: True
  truncation: error
  apply_chat_template_kwargs:
    enable_thinking: False                         # Qwen3 <think> off -> action fits in max_response_length

actor_rollout_ref:
  model:
    path: Qwen/Qwen3-8B
    enable_gradient_checkpointing: True
    use_remove_padding: True
    lora_rank:  32                                 # >0 enables LoRA
    lora_alpha: 16
    target_modules: all-linear
  actor:
    strategy: fsdp
    ppo_mini_batch_size: 64
    ppo_micro_batch_size_per_gpu: 8
    use_kl_loss: True                              # GRPO/GiGPO
    kl_loss_coef: 0.01
    kl_loss_type: low_var_kl
    entropy_coeff: 0.001
    use_invalid_action_penalty: True               # penalize unparseable/illegal actions
    invalid_action_penalty_coef: 0.1
    optim:
      lr: 1e-6
      weight_decay: 0.01
  rollout:
    name: vllm
    temperature: 1.0
    tensor_model_parallel_size: 1
    gpu_memory_utilization: 0.6
    n: 8                                           # group size (== env.rollout.n)

algorithm:
  adv_estimator: gigpo                             # multi-turn step+episode advantages (or: grpo)
  gamma: 0.99
  use_kl_in_reward: False
  kl_ctrl:
    type: fixed
    kl_coef: 0.001
  gigpo:
    step_advantage_w: 1.0
    mode: mean_std_norm

env:
  env_name: balatro                                # -> BalatroEnvManager (registered, see runbook)
  seed: 0
  max_steps: 350                                   # a full ~300-decision run + headroom
  history_length: 8                                # raw turns kept (matches M1 context window)
  rollout:
    n: 8                                           # group size — MUST match actor_rollout_ref.rollout.n
  resources_per_worker:
    num_cpus: 0.5
    num_gpus: 0                                    # the engine is CPU-bound; GPU is for the policy
  balatro:
    reward_name: shaped                            # dense per-turn signal (pairs with gigpo)
    req_scale_start: 0.1                           # curriculum: trivial blinds first -> reward variance
    req_scale_end: 1.0
    enable_bosses: False

trainer:
  total_epochs: 150
  n_gpus_per_node: 1
  nnodes: 1
  test_freq: 5
  save_freq: 20
  val_before_train: True
  logger: ['console', 'tensorboard']
  project_name: balatro-e6-m2
  experiment_name: gigpo_qwen3_8b_lora
  default_local_dir: /workspace/sweep_out/e6_m2
